<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 1860" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowDown" markerWidth="12" markerHeight="12" refX="5" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,0 L5,9 Z" fill="#7c2d12"/>
    </marker>
    <style>
      .title{font-size:31px;font-weight:700;fill:#0f172a}
      .subtitle{font-size:14px;fill:#475569}
      .layerName{font-size:20px;font-weight:700}
      .layerTag{font-size:12.5px;font-weight:600;opacity:.85}
      .box{rx:7;stroke-width:1.2}
      .boxT{font-size:13px;font-weight:650;fill:#0f172a}
      .boxF{font-size:10px;fill:#475569;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .boxThreat{font-size:10.5px;fill:#b91c1c;font-style:italic}
      .grpName{font-size:14px;font-weight:700;fill:#1e293b}
