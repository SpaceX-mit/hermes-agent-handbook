  <text x="60" y="1410" class="grpName" font-size="17" fill="#f1f5f9">OpenClaw vs Hermes 安全态势对比（基于代码证据）</text>

  <text x="60" y="1442" class="note" fill="#cbd5e1"><tspan font-weight="700" fill="#86efac">共同骨架</tspan>：渠道授权（*_ALLOWED_USERS + gateway.auth）→ 审批闸（approvals.mode）→ 沙箱隔离（docker）→ 密钥(SecretRef)/技能/MCP/插件信任。配置驱动，单网关多渠道。</text>
  <text x="60" y="1470" class="note" fill="#cbd5e1"><tspan font-weight="700" fill="#86efac">同一边界哲学</tspan>：真正的安全边界是容器/OS 隔离；审批模式与白名单是配置级启发式。摄入不可信内容应启用 docker 沙箱。</text>

  <text x="60" y="1504" class="note" fill="#cbd5e1"><tspan font-weight="700" fill="#fca5a5">Hermes 相对 OpenClaw 的安全增强（均有代码证据）</tspan>：</text>
  <text x="76" y="1528" class="note" fill="#cbd5e1">· <tspan font-weight="700">命令闸</tspan>：新增不可绕 Hardline(12模式)+sudo 守卫，外部 Tirith AST 扫描，NFKC 反混淆归一（OpenClaw 仅 mode+rules）</text>
  <text x="76" y="1550" class="note" fill="#cbd5e1">· <tspan font-weight="700">供应链</tspan>：mcp_security.py 含 "hermes-0day" IOC + 持久化形态检测、osv_check OSV 扫描、skills_guard 98 模式信任分级</text>
  <text x="76" y="1572" class="note" fill="#cbd5e1">· <tspan font-weight="700">密钥</tspan>：输出脱敏 redact、多租户 fail-closed secret_scope、落盘 SHA256 指纹化、SSRF 云元数据强制阻断</text>
  <text x="76" y="1594" class="note" fill="#cbd5e1">· <tspan font-weight="700">观测</tspan>：security_advisories 启动横幅(投毒名单)、security_audit_startup 姿态告警(root/无认证监听)、跨会话配额熔断</text>

  <text x="60" y="1628" class="note" fill="#94a3b8" font-size="11.5">命名("hermes-0day")与"Ported from openclaw#NNNNN"溯源共同表明：Hermes 在 fork OpenClaw 后，针对 OpenClaw 时代暴露的攻击事件做了系统性安全加固。</text>
  <text x="60" y="1652" class="note" fill="#94a3b8" font-size="11.5">局限：OpenClaw 的函数/类级实现因无源码无法标注；本图方框=迁移代码读取的真实配置键/目录（已 grep 校验）。如需精确到文件/类，请提供 openclaw/openclaw 源码。</text>
  <text x="60" y="1676" class="note" fill="#94a3b8" font-size="11.5">配套：hermes-security-skeleton.svg（Hermes 安全产品骨架）· security-panorama.svg（Hermes 威胁→控制全景）· 17-安全功能分析.md</text>

  <text x="40" y="1730" class="note" fill="#94a3b8">读法：威胁源①→⑥ 自顶向下；绿框=真实边界(容器/OS)，黄虚线框=配置级启发式控制；底部为 OpenClaw↔Hermes 代码证据对比。</text>
  <text x="40" y="1752" class="note" fill="#94a3b8">证据来源：optional-skills/migration/openclaw-migration/scripts/openclaw_to_hermes.py（3136 行）逐项读取 OpenClaw 配置 schema。</text>
